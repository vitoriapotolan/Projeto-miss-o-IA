<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jornada nas Estrelas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>A Missão Estelar</h1>
        <p id="texto-historia">Você é o capitão da nave Odyssey. De repente, um buraco de minhoca surge à sua frente. Os sensores detectam um planeta habitável do outro lado, mas o combustível está baixo.</p>
        
        <div class="botoes-container">
            <button class="btn" onclick="escolha('atravessar')">Atravessar o buraco de minhoca</button>
            <button class="btn" onclick="escolha('voltar')">Dar a volta e retornar à Terra</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
